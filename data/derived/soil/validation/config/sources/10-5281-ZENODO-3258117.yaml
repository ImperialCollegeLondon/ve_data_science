doi: 10.5281/ZENODO.3258117
decision: included
reason: used_elsewhere
notes:
  NH4-N and NO3-N in the 'data one off field' sheet was used for input data in
  analysis\soil\ammonium_nitrate\model.R; but there are other soil variables
  such as soil_N, soil_C and soil_moisture worth validating. Contains litter C
  and N but they are percentage of litter mass, but the latter was not provided.
logged_at: "2026-05-21"
metadata:
