    Soil greenhouse gas fluxes and associated parameters from forest and oil
    palm in the SAFE landscape
  author: Drewer, Julia and Leduning, Melissa and Sentian, Justin and Skiba, Ute
  year: "2019"
  journal: .na.character
  publisher: Zenodo
  url: https://zenodo.org/record/3258117
  keywords:
    HTMF, soil, methane, gas exchange, SAFE project, biogeochemistry, greenhouse
    gases, GHG, nitrous oxide
source_id: drewer_2019
data_file: data/primary/soil/drewer_2019/3_GHG_jdrewer.csv
skip_rows: 5
variables:
  soil_N:
    var_canonical: derived
    transform:
      "soil_cnp_pool_lmwc + soil_cnp_pool_maom + soil_cnp_pool_necromass +
      soil_cnp_pool_pom + soil_n_pool_ammonium + soil_n_pool_nitrate"
    unit: g cm^-3
    unit_transform: kg N m^-3
    description:
      Percentage of soil N. Calculated in the CSV sheet as 'soil_N% *
      bulk_density'.
  soil_C:
    var_canonical: derived
    transform:
      "soil_cnp_pool_lmwc + soil_cnp_pool_maom + soil_cnp_pool_necromass +
      soil_cnp_pool_pom + soil_c_pool_arbuscular_mycorrhiza +
      soil_c_pool_bacteria + soil_c_pool_ectomycorrhiza +
      soil_c_pool_saprotrophic_fungi"
    unit: g cm^-3
    unit_transform: kg C m^-3
    description:
      Percentage of soil C. Calculated in the CSV sheet as 'soil_C% *
      bulk_density'.
