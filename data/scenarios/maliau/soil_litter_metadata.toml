[soil_c_pool_necromass]
unit = "kg C m^-3"
description = "Necrotic soil carbon pool. Estimated with amino sugar biomarkers and then scaled with total soil carbon."
script_path = "analysis/soil/necromass/necromass.R"
source = "Li et al. (2023) https://doi.org/10.1016/j.scitotenv.2023.163204"
source_type = "Pasoh forest reserve, Malaysia"
comment = "Soil microbial necromass was very data poor. We used amino sugar as biomarker, though this only capture cell wall residues and may underestimate true necromass."

