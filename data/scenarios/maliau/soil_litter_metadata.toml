description = "Necrotic soil carbon, nitrogen and phosphorous pools"
script_path = "analysis/soil/necromass/necromass.R"
source = "Li et al. (2023) https://doi.org/10.1016/j.scitotenv.2023.163204"
source_type = "Pasoh forest reserve, Malaysia"
comment = "Soil microbial necromass was very data poor. We used amino sugar as biomarker, though this only capture cell wall residues and may underestimate true necromass. First we estimated the C pool, and then scaled it to get N and P pools using microbe stoichiometry."

[soil_enzyme_pom_bacteria]
unit = "kg C m^-3"
description = "Amount of bacterial enzyme class which breaks down particulate organic matter. Best guess from first principle."
script_path = "analysis/soil/enzyme/enzyme_concentration.R"
source = "Wang et al. (2013) https://doi.org/10.1890/12-0681.1"
source_type = "First principle"
comment = "Soil enzyme concentrations are currently best guesses based on the MEND model (Wang et al. 2013). I have not been able to find enzyme concentration or biomass stock in the soil. Most, if not all, studies reported enzyme *activity* levels instead of biomass. While it is possible to use enzyme activity level to estimate enzyme stock using Michaelis-Menten kinetics, there are other unknowns in this approach, e.g., rate constants and substrate concentrations. These initial variables are certainty worth revisiting."

