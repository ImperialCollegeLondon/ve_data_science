# Metadata for the initial values of soil and litter modules for the Maliau scenario

# unit: the unit of variable
# description: brief description of the variable
# script_path: the directory of the analysis script used to estimate the
#              initial value
# source: data sources, with DOI / URL
# source_type: Maliau = data source includes Maliau; SAFE = data source from SAFE but excludes Maliau; tropical; forest; global
# comment: assumptions, decisions, TODOs

[pH]
unit = "pH"
description = "Soil pH. Predicted by a spatial model fitted to the SAFE data campaign."
script_path = "analysis/soil/initialisation/model_safe.R"
source = "SAFE soil campaign 2024. DOI pending."
source_type = "Maliau"
comment = ""

[clay_fraction]
unit = "-"
description = "The fraction of clay in soil. Predicted by a spatial model fitted to the SAFE data campaign."
script_path = "analysis/soil/initialisation/model_safe.R"
source = "SAFE soil campaign 2024. DOI pending."
source_type = "Maliau"
comment = ""

[soil_cnp_pool_lmwc]
unit = "kg m^-3"
description = "Soil carbon, nitrogen and phosphorous pools in low molecular weight organic matter."
script_path = [
"analysis/soil/nutrient_pools/doc_don.R" ,
"analysis/soil/nutrient_pools/phosphorous_pools.R"
]
source = [
"Montano et al. (2007) https://doi.org/10.1007/s11104-007-9281-x" ,
"Imai et al. (2012) https://jtfs.frim.gov.my/jtfs/article/view/472"
]
source_type = "For C and N, Mexican tropical deciduous forest; rainy season data. For P, Lowland tropical rainforest of Deramakot, Borneo."
comment = "For C and N, the system was a Mexican tropical deciduous forest; we took the rainy season values to approximate moist tropical forests (e.g., Maliau Basin). DOC was used as an imperfect proxy for LMWC for now. This should be a reasonable placeholder value because the goal now is only to get as close to the initial value as possible. For P, we mapped Imai et al. (2012) field-measured phosphorous pools to VE pools based on nomenclature in Gijsman et al. (1996; Fig. 2) https://doi.org/10.2134/agronj1996.00021962003600060008x."

[soil_cnp_pool_maom]
unit = "kg m^-3"
description = "Soil mineral associated organic carbon, nitrogen and phosphorous pools."
script_path = [
"analysis/soil/nutrient_pools/pom_maom_sayer.R" ,
"analysis/soil/nutrient_pools/phosphorous_pools.R"
]
source = [
"Sayer et al. (2021) https://doi.org/10.1007/s10533-020-00747-7" ,
"Imai et al. (2012) https://jtfs.frim.gov.my/jtfs/article/view/472"
]
source_type = "For C and N, wature lowland tropical forest on Gigante Peninsula, Panama. For P, lowland tropical rainforest of Deramakot, Borneo."
comment = "For P, we mapped Imai et al. (2012) field-measured phosphorous pools to VE pools based on nomenclature in Gijsman et al. (1996; Fig. 2) https://doi.org/10.2134/agronj1996.00021962003600060008x. The Imai et al. dataset has Po_OH, which can be a proxy of P in POM + MAOM so we need another ratio to split this value into the POM and MAOM pool P pool fractionalisation data is very very scarce, I will rely on a study in the Amazon (Hoosbeek et al. 2023) https://doi.org/10.1007/s10342-023-01577-6 In their Figure 3, they showed results of P in three soil fractions: free light (fLF), occluded light (oLF) and mineral associated heavy (maHF). According to the method paper they cited (Six et al. 2002), the fLF fraction seems to be a proxy for POM, and I'll use oLF + maHF as a proxy for MAOM. Now the challenge is that their figure is poor in resolution so value extraction is not easy. I will eyeball it, which should be fine given that we are trying to estimate initial values, not really constants / parameters. I eyeballed the proportion of P in POM to be 5% and the rest (95%) in MAOM."

[soil_c_pool_bacteria]
unit = "kg C m^-3"
description = "Soil bacterial biomass (carbon) pool. Scaled from the total carbon pool predicted by a spatial model fitted to the SAFE data campaign."
script_path= [
"analysis/soil/nutrient_pools/carbon_microbial_guild.R",
"analysis/soil/nutrient_pools/carbon_microbial.R"
]
source = [
"Serna-Chavez et al. (2013) https://doi.org/10.1111/geb.12070" ,
"Robinson et al. (2024) https://doi.org/10.5281/zenodo.13122106" ,
"Andrieux et al. (2021) https://doi.org/10.1111/geb.13265"
]
source_type = "Global and SAFE"
comment = "To scale microbial carbon from total carbon, first we obtained a global map of estimated microbe-to-soil carbon ratio (Serna-Chavez et al. 2013).Then, the predicted microbe carbon was split into bacteria and fungal guilds using SAFE data (Robinson et al. 2024). Finally, the bacteria and fungi biomass are converted to carbon content using stoichiometry from a stoichiometric traits of heterotrophs by Andrieux et al. (2021)"

