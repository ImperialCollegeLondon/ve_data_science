[soil_n_pool_ammonium]
unit = "kg N m^-3"
description = "Amount of nitrogen contained in the soil ammonium (NH4+) pool. Measured by the static chamber method at SAFE."
script_path = "analysis/soil/ammonium_nitrate/model.R"
