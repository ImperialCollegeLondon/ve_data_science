[soil_p_pool_dop]
unit = "kg P m^-3"
description = "Dissolved organic phosphorus pool"
script_path = "analysis/soil/nutrient_pools/phosphorous_pools.R"
source = "Imai et al. (2012) https://jtfs.frim.gov.my/jtfs/article/view/472"
source_type = "Lowland tropical rainforest of Deramakot, Borneo"
comment = "We mapped Imai et al. (2012) field-measured phosphorous pools to VE pools based on nomenclature in Gijsman et al. (1996; Fig. 2) https://doi.org/10.2134/agronj1996.00021962003600060008x."

[soil_p_pool_particulate]
unit = "kg P m^-3"
description = "Particulate organic phosphorus pool"
script_path = "analysis/soil/nutrient_pools/phosphorous_pools.R"
source = "Imai et al. (2012) https://jtfs.frim.gov.my/jtfs/article/view/472"
source_type = "Lowland tropical rainforest of Deramakot, Borneo"
comment = "We mapped Imai et al. (2012) field-measured phosphorous pools to VE pools based on nomenclature in Gijsman et al. (1996; Fig. 2) https://doi.org/10.2134/agronj1996.00021962003600060008x. The Imai et al. dataset has Po_OH, which can be a proxy of P in POM + MAOM so we need another ratio to split this value into the POM and MAOM pool P pool fractionalisation data is very very scarce, I will rely on a study in the Amazon (Hoosbeek et al. 2023) https://doi.org/10.1007/s10342-023-01577-6 In their Figure 3, they showed results of P in three soil fractions: free light (fLF), occluded light (oLF) and mineral associated heavy (maHF). According to the method paper they cited (Six et al. 2002), the fLF fraction seems to be a proxy for POM, and I'll use oLF + maHF as a proxy for MAOM. Now the challenge is that their figure is poor in resolution so value extraction is not easy. I will eyeball it, which should be fine given that we are trying to estimate initial values, not really constants / parameters. I eyeballed the proportion of P in POM to be 5% and the rest (95%) in MAOM."

[soil_p_pool_maom]
unit = "kg P m^-3"
description = "Amount of phosphorus contained in the mineral associated organic matter pool"
script_path = "analysis/soil/nutrient_pools/phosphorous_pools.R"
source = "Imai et al. (2012) https://jtfs.frim.gov.my/jtfs/article/view/472"
source_type = "Lowland tropical rainforest of Deramakot, Borneo"
comment = "We mapped Imai et al. (2012) field-measured phosphorous pools to VE pools based on nomenclature in Gijsman et al. (1996; Fig. 2) https://doi.org/10.2134/agronj1996.00021962003600060008x. The Imai et al. dataset has Po_OH, which can be a proxy of P in POM + MAOM so we need another ratio to split this value into the POM and MAOM pool P pool fractionalisation data is very very scarce, I will rely on a study in the Amazon (Hoosbeek et al. 2023) https://doi.org/10.1007/s10342-023-01577-6 In their Figure 3, they showed results of P in three soil fractions: free light (fLF), occluded light (oLF) and mineral associated heavy (maHF). According to the method paper they cited (Six et al. 2002), the fLF fraction seems to be a proxy for POM, and I'll use oLF + maHF as a proxy for MAOM. Now the challenge is that their figure is poor in resolution so value extraction is not easy. I will eyeball it, which should be fine given that we are trying to estimate initial values, not really constants / parameters. I eyeballed the proportion of P in POM to be 5% and the rest (95%) in MAOM."

