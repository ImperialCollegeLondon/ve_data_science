# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    # These are generic hooks to keep files clean and tidy
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: debug-statements
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # This is python specific linting and formatting using ruff
    rev: v0.14.5
    hooks:
      - id: ruff # Run the linter.
        args: [ --fix, --exit-non-zero-on-fix ]
      - id: ruff-format # Run the formatter.
  - repo: https://github.com/igorshubovych/markdownlint-cli
    # This is markdown linting
    rev: v0.45.0
    hooks:
      - id: markdownlint
        exclude: .ipynb_checkpoints
  - repo: https://github.com/posit-dev/air-pre-commit
    # Air formatter for R codes
    rev: 0.9.0
    hooks:
      - id: air-format
