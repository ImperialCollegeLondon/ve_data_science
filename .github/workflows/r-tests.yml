name: R Tests

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "tools/R/R/**"
      - "tools/R/tests/testthat/**"
      - ".github/workflows/r-tests.yml"
  pull_request:
    paths:
      - "tools/R/R/**"
      - "tools/R/tests/testthat/**"
      - ".github/workflows/r-tests.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
          use-public-rspm: true # faster binary package installs

      # --- Python: uv (preferred, used when uv.lock is present) ---
      - name: Detect Python package manager
        id: pkg-manager
        run:
          echo "use_uv=$(test -f uv.lock && echo true || echo false)" >>
          "$GITHUB_OUTPUT"

      - name: Set up uv
        if: steps.pkg-manager.outputs.use_uv == 'true'
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"

      - name: Install Python dependencies (uv)
        if: steps.pkg-manager.outputs.use_uv == 'true'
        run: uv sync

      # --- Python: Poetry (fallback while PR #384 is not yet merged) ---
      - name: Set up Python
        if: steps.pkg-manager.outputs.use_uv == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies (Poetry)
        if: steps.pkg-manager.outputs.use_uv == 'false'
        run: |
          pipx install poetry
          poetry install --no-interaction

      # virtual_ecosystem cannot be added to pyproject.toml under Poetry because
      # rasterio's cligj dependency requires click <8 while virtual_ecosystem
      # requires click >=8 (via dask). Once the uv migration (PR #384) is merged,
      # remove these two steps and instead run:
      #   uv add virtual-ecosystem
      # uv's resolver handles the conflict via its more permissive dependency model.
      - name: Install virtual_ecosystem (uv)
        if: steps.pkg-manager.outputs.use_uv == 'true'
        run: |
          if grep -q "virtual.ecosystem" pyproject.toml; then
            echo "virtual-ecosystem found in pyproject.toml — installed via uv sync, nothing to do."
          else
            echo "::warning::virtual-ecosystem is not in pyproject.toml. After the uv migration, run 'uv add virtual-ecosystem' and remove this step."
            uv pip install virtual-ecosystem
          fi
          uv pip install "pyrealm==2.0.0"

      - name: Install virtual_ecosystem (Poetry)
        if: steps.pkg-manager.outputs.use_uv == 'false'
        run: poetry run pip install virtual-ecosystem "pyrealm==2.0.0"

      # --- System libraries required by R packages ---
      - name: Install system dependencies
        run: sudo apt-get install -y libudunits2-dev libnetcdf-dev

      # --- R dependencies ---
      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: any::sessioninfo
          extra-packages: |
            any::here
            any::testthat
            any::withr
            any::reticulate
            any::toml
            any::tidync
            any::purrr
            any::RNetCDF
            any::dplyr
            any::stringr
            any::cli

      # --- Tests ---
      - name: Run R tests
        env:
          # uv creates .venv in the repo root; Poetry path resolved at runtime below
          RETICULATE_PYTHON:
            ${{ steps.pkg-manager.outputs.use_uv == 'true' && '.venv/bin/python'
            || '' }}
        run: |
          if (Sys.getenv("RETICULATE_PYTHON") == "") {
            # Poetry: resolve venv path at runtime
            venv <- trimws(system("poetry env info --path", intern = TRUE))
            Sys.setenv(RETICULATE_PYTHON = file.path(venv, "bin", "python"))
          }
          testthat::test_dir(
            here::here("tools/R/tests/testthat"),
            reporter = "progress",
            stop_on_failure = TRUE
          )
        shell: Rscript {0}
